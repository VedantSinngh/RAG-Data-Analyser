name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (spins down after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Replace the URL below with your actual deployed Render backend health endpoint,
          # or define a GitHub Repository Secret named RENDER_BACKEND_URL.
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            # Fallback URL if secret is not set (replace with your actual Render URL)
            BACKEND_URL="https://your-backend-app-name.onrender.com/api/v1/health"
          fi
          echo "Pinging backend at $BACKEND_URL..."
          curl -s -f "$BACKEND_URL" || echo "Warning: Ping failed, but request was sent."
